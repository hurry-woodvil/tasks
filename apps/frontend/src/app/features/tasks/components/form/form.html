<form (ngSubmit)="onSubmit()">
  <input
    type="text"
    aria-label="新規タスク名"
    [value]="title()"
    (input)="title.set($any($event.target).value)"
    placeholder="タスク名"
  />

  <input
    type="date"
    aria-label="新規期限"
    [value]="dueDate() ?? ''"
    (input)="dueDate.set($any($event.target).value || null)"
  />

  <button type="submit">追加</button>
</form>
