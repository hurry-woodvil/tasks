<div>
  <button
    type="button"
    aria-label="すべて"
    [class.active]="filter() === 'all'"
    (click)="filterChange.emit('all')"
  >
    すべて
  </button>

  <button
    type="button"
    aria-label="未完了"
    [class.active]="filter() === 'todo'"
    (click)="filterChange.emit('todo')"
  >
    未完了
  </button>

  <button
    type="button"
    aria-label="完了済み"
    [class.active]="filter() === 'done'"
    (click)="filterChange.emit('done')"
  >
    完了済み
  </button>
</div>

<div>
  <input
    type="search"
    aria-label="タスク検索"
    placeholder="タスクを検索"
    [value]="searchQuery()"
    (input)="searchQueryChange.emit($any($event.target).value)"
  />
</div>

<div>
  <label>
    並び順
    <select
      aria-label="並び順"
      [value]="sort()"
      (change)="sortChange.emit($any($event.target).value)"
    >
      <option value="createdAt">作成日順</option>
      <option value="dueDate">期限日順</option>
      <option value="title">タイトル順</option>
    </select>
  </label>
</div>
