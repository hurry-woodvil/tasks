<section class="task-page">
  <header class="task-page__header">
    <h1>Tasks</h1>
  </header>

  <app-task-controls
    [filter]="taskStore.filter()"
    [searchQuery]="taskStore.searchQuery()"
    [sort]="taskStore.sort()"
    (filterChange)="taskStore.setFilter($event)"
    (searchQueryChange)="taskStore.setSearchQuery($event)"
    (sortChange)="taskStore.setSort($event)"
  />

  <app-task-form (add)="taskStore.addTask($event.title, $event.dueDate)" />

  @if (taskStore.loading()) {
    <app-task-loading />
  } @else if (taskStore.error()) {
    <app-task-error-banner [message]="taskStore.error()!" (retry)="taskStore.loadTasks()" />
  } @else {
    <app-task-list
      [tasks]="taskStore.pagedTasks()"
      (toggleTask)="taskStore.toggleTask($event)"
      (deleteTask)="taskStore.deleteTask($event)"
      (saveTask)="taskStore.updateTask($event.id, $event.title, $event.dueDate)"
    />

    <app-task-pagination
      [currentPage]="taskStore.currentPage()"
      [totalPages]="taskStore.totalPages()"
      (previousPage)="taskStore.goToPreviousPage()"
      (nextPage)="taskStore.goToNextPage()"
    />
  }

  @if (taskStore.recentlyDeletedTask(); as task) {
    <app-task-undo-banner [taskTitle]="task.title" (undo)="taskStore.undoDeleteTask()" />
  }
</section>
